services:
  # 🧠 Backend (FastAPI)
  - type: web
    name: paperpal-backend1
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT   # ✅ Dynamic Render port
    plan: free
    envVars:
      - key: APP_NAME
        value: paperpal
      - key: APP_ENV
        value: prod
      - key: PORT
        value: 10000                # ✅ helps local dev consistency
      - key: MONGODB_URI
        sync: false                 # ✅ Secure: set manually in dashboard
      - key: MONGODB_DB
        value: paperpal_db
      - key: FRONTEND_ORIGIN
        value: https://paperpal-2-3.onrender.com   # ✅ must match actual frontend URL

  # 🎨 Frontend (Streamlit)
  - type: web
    name: paperpal-frontend
    env: python
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: streamlit run streamlit_app.py --server.port=$PORT --server.address=0.0.0.0   # ✅ use dynamic port
    plan: free
    envVars:
      - key: BACKEND_BASE_URL
        value: https://paperpal-backend1.onrender.com   # ✅ points to live backend
      - key: API_PREFIX
        value: /api/v1
      - key: API_UPLOAD_ROUTE
        value: /papers/upload
